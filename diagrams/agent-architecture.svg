<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" rx="12"/>
  
  <text x="400" y="38" text-anchor="middle" fill="#f59e0b" font-size="22" font-weight="bold">Agent 核心架构</text>
  <text x="400" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">智能体的核心组件与数据流</text>

  <!-- Top: User Input -->
  <rect x="300" y="72" width="200" height="50" rx="12" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="400" y="95" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="bold">👤 用户输入 / 感知</text>
  <text x="400" y="113" text-anchor="middle" fill="#78350f" font-size="10">自然语言 / 多模态</text>

  <line x1="400" y1="122" x2="400" y2="170" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Central Agent Core -->
  <rect x="270" y="175" width="260" height="100" rx="16" fill="#334155" filter="url(#glow)" stroke="#f59e0b" stroke-width="3"/>
  <rect x="280" y="185" width="240" height="80" rx="12" fill="#1e293b"/>
  <text x="400" y="215" text-anchor="middle" fill="#f59e0b" font-size="20" font-weight="bold">🧠 Agent Core</text>
  <text x="400" y="240" text-anchor="middle" fill="#f8fafc" font-size="14">大语言模型 (LLM)</text>
  <text x="400" y="258" text-anchor="middle" fill="#94a3b8" font-size="10">GPT-4 / Claude / Gemini</text>

  <!-- Planning module (top-left of core) -->
  <rect x="140" y="130" width="110" height="40" rx="8" fill="#334155" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="195" y="155" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">📋 规划模块</text>
  <line x1="250" y1="155" x2="270" y2="185" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Reasoning engine (top-right of core) -->
  <rect x="550" y="130" width="110" height="40" rx="8" fill="#334155" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="605" y="155" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">⚡ 推理引擎</text>
  <line x1="550" y1="155" x2="530" y2="185" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Left: Memory System -->
  <rect x="20" y="210" width="210" height="200" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="125" y="240" text-anchor="middle" fill="#3b82f6" font-size="15" font-weight="bold">💾 记忆系统</text>

  <rect x="35" y="255" width="180" height="35" rx="8" fill="#334155"/>
  <text x="125" y="277" text-anchor="middle" fill="#f8fafc" font-size="12">📌 短期记忆</text>
  <text x="125" y="285" text-anchor="middle" fill="#94a3b8" font-size="8">当前对话上下文</text>

  <rect x="35" y="300" width="180" height="35" rx="8" fill="#334155"/>
  <text x="125" y="322" text-anchor="middle" fill="#f8fafc" font-size="12">🏛️ 长期记忆</text>
  <text x="125" y="330" text-anchor="middle" fill="#94a3b8" font-size="8">向量数据库持久化</text>

  <rect x="35" y="345" width="180" height="35" rx="8" fill="#334155"/>
  <text x="125" y="367" text-anchor="middle" fill="#f8fafc" font-size="12">🔄 工作记忆</text>
  <text x="125" y="375" text-anchor="middle" fill="#94a3b8" font-size="8">中间推理状态</text>

  <!-- Arrows between memory and core -->
  <line x1="230" y1="270" x2="270" y2="230" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="270" y1="245" x2="230" y2="330" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Right: Tool Set -->
  <rect x="570" y="210" width="210" height="200" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="240" text-anchor="middle" fill="#10b981" font-size="15" font-weight="bold">🔧 工具集</text>

  <rect x="585" y="255" width="180" height="35" rx="8" fill="#334155"/>
  <text x="675" y="277" text-anchor="middle" fill="#f8fafc" font-size="12">🔍 搜索引擎</text>

  <rect x="585" y="300" width="180" height="35" rx="8" fill="#334155"/>
  <text x="675" y="322" text-anchor="middle" fill="#f8fafc" font-size="12">💻 代码执行</text>

  <rect x="585" y="345" width="180" height="35" rx="8" fill="#334155"/>
  <text x="675" y="367" text-anchor="middle" fill="#f8fafc" font-size="12">🌐 API 调用</text>

  <rect x="585" y="390" width="85" height="25" rx="6" fill="#334155"/>
  <text x="628" y="407" text-anchor="middle" fill="#94a3b8" font-size="10">🗄️ 数据库</text>
  <rect x="680" y="390" width="85" height="25" rx="6" fill="#334155"/>
  <text x="723" y="407" text-anchor="middle" fill="#94a3b8" font-size="10">📁 文件系统</text>

  <!-- Arrows between tools and core -->
  <line x1="530" y1="230" x2="570" y2="270" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="330" x2="530" y2="245" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Bottom: Action/Output -->
  <line x1="400" y1="275" x2="400" y2="440" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="270" y="445" width="260" height="55" rx="12" fill="#10b981" filter="url(#shadow)"/>
  <text x="400" y="470" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="bold">⚡ 行动 / 输出</text>
  <text x="400" y="490" text-anchor="middle" fill="#d1fae5" font-size="10">文本回答 / 工具调用 / 任务执行</text>

  <!-- Data flow labels -->
  <rect x="150" y="520" width="500" height="65" rx="10" fill="#1e293b" opacity="0.6" stroke="#334155"/>
  <text x="400" y="545" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">数据流说明</text>
  <text x="400" y="565" text-anchor="middle" fill="#94a3b8" font-size="11">实线箭头 = 主数据流 ｜ 虚线 = 反馈/更新 ｜ 所有组件围绕 LLM 核心协同工作</text>
</svg>
