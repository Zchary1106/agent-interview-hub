</defs><rect width="760" height="430" fill="url(#bg)" rx="12"/><text x="380.0" y="36" text-anchor="middle" fill="#f59e0b" font-size="20" font-weight="bold">MCP 集成复杂度对比</text><text x="380.0" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">从 M×N 点对点集成降到 M+N 标准协议集成</text><text x="190" y="88" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="bold">传统模式：M × N 集成</text><rect x="55" y="130" width="120" height="110" rx="12" fill="#3b82f6" filter="url(#shadow)"/><text x="115.0" y="183.0" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">M 个应用</text><text x="115.0" y="203.0" text-anchor="middle" fill="#dbeafe" font-size="11">App1 / App2 / App3</text><rect x="240" y="130" width="150" height="110" rx="12" fill="#10b981" filter="url(#shadow)"/><text x="315.0" y="183.0" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">N 个服务</text><text x="315.0" y="203.0" text-anchor="middle" fill="#d1fae5" font-size="11">GitHub / Slack / DB</text><text x="222" y="195" text-anchor="middle" fill="#f59e0b" font-size="34" font-weight="bold">×</text><text x="190" y="275" text-anchor="middle" fill="#94a3b8" font-size="12">每个 App 都要写每个 API 的集成代码</text><text x="570" y="88" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="bold">MCP 模式：M + N 集成</text><rect x="445" y="130" width="120" height="110" rx="12" fill="#3b82f6" filter="url(#shadow)"/><text x="505.0" y="183.0" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">M 个应用</text><text x="505.0" y="203.0" text-anchor="middle" fill="#dbeafe" font-size="11">App1 / App2 / App3</text><rect x="610" y="155" width="80" height="60" rx="12" fill="#f59e0b" filter="url(#shadow)"/><text x="650.0" y="190.0" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">MCP</text><rect x="560" y="285" width="150" height="90" rx="12" fill="#10b981" filter="url(#shadow)"/><text x="635.0" y="328.0" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">N 个 Server</text><text x="635.0" y="348.0" text-anchor="middle" fill="#d1fae5" font-size="11">GitHub / Slack / DB</text><line x1="565" y1="185" x2="608" y2="185" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/><line x1="650" y1="215" x2="635" y2="285" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/></svg>
