<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" font-family="sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="850" height="520" fill="url(#bg)" rx="12"/>
  
  <text x="425" y="38" text-anchor="middle" fill="#f59e0b" font-size="22" font-weight="bold">Agent 框架选型决策树</text>
  <text x="425" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">根据需求选择最适合的框架</text>

  <!-- Root question -->
  <rect x="290" y="80" width="220" height="50" rx="12" fill="#334155" filter="url(#shadow)" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">🤔 需要多Agent协作？</text>
  <text x="400" y="122" text-anchor="middle" fill="#fbbf24" font-size="10">多个Agent协同工作</text>

  <!-- Yes branch (left) -->
  <line x1="340" y1="130" x2="200" y2="175" stroke="#10b981" stroke-width="2.5"/>
  <text x="255" y="148" fill="#10b981" font-size="13" font-weight="bold">是 ✓</text>

  <rect x="100" y="180" width="200" height="50" rx="12" fill="#334155" filter="url(#shadow)" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="205" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">🎭 需要角色扮演？</text>
  <text x="200" y="222" text-anchor="middle" fill="#93c5fd" font-size="10">Agent有明确角色定义</text>

  <!-- Yes -> CrewAI -->
  <line x1="140" y1="230" x2="90" y2="275" stroke="#10b981" stroke-width="2.5"/>
  <text x="100" y="250" fill="#10b981" font-size="12" font-weight="bold">是</text>

  <rect x="30" y="280" width="130" height="55" rx="12" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="95" y="303" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="bold">🚀 CrewAI</text>
  <text x="95" y="323" text-anchor="middle" fill="#dbeafe" font-size="10">角色驱动的多Agent</text>

  <!-- No -> AutoGen -->
  <line x1="260" y1="230" x2="310" y2="275" stroke="#ef4444" stroke-width="2.5"/>
  <text x="300" y="250" fill="#ef4444" font-size="12" font-weight="bold">否</text>

  <rect x="250" y="280" width="130" height="55" rx="12" fill="#10b981" filter="url(#shadow)"/>
  <text x="315" y="303" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="bold">🔄 AutoGen</text>
  <text x="315" y="323" text-anchor="middle" fill="#d1fae5" font-size="10">对话驱动的多Agent</text>

  <!-- No branch (right) -->
  <line x1="460" y1="130" x2="600" y2="175" stroke="#ef4444" stroke-width="2.5"/>
  <text x="545" y="148" fill="#ef4444" font-size="13" font-weight="bold">否 ✗</text>

  <rect x="500" y="180" width="200" height="50" rx="12" fill="#334155" filter="url(#shadow)" stroke="#3b82f6" stroke-width="2"/>
  <text x="600" y="205" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">🔀 需要复杂工作流？</text>
  <text x="600" y="222" text-anchor="middle" fill="#93c5fd" font-size="10">循环/条件/状态管理</text>

  <!-- Yes -> LangGraph -->
  <line x1="540" y1="230" x2="480" y2="275" stroke="#10b981" stroke-width="2.5"/>
  <text x="495" y="250" fill="#10b981" font-size="12" font-weight="bold">是</text>

  <rect x="410" y="280" width="150" height="55" rx="12" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="485" y="303" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="bold">📊 LangGraph</text>
  <text x="485" y="323" text-anchor="middle" fill="#78350f" font-size="10">图结构工作流编排</text>

  <!-- No -> need low code? -->
  <line x1="660" y1="230" x2="710" y2="285" stroke="#ef4444" stroke-width="2.5"/>
  <text x="700" y="255" fill="#ef4444" font-size="12" font-weight="bold">否</text>

  <rect x="620" y="290" width="190" height="50" rx="12" fill="#334155" filter="url(#shadow)" stroke="#3b82f6" stroke-width="2"/>
  <text x="715" y="315" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">🖱️ 需要低代码？</text>
  <text x="715" y="332" text-anchor="middle" fill="#93c5fd" font-size="10">可视化拖拽编排</text>

  <!-- Yes -> Dify/Langflow -->
  <line x1="660" y1="340" x2="600" y2="395" stroke="#10b981" stroke-width="2.5"/>
  <text x="615" y="365" fill="#10b981" font-size="12" font-weight="bold">是</text>

  <rect x="490" y="395" width="180" height="55" rx="12" fill="#ef4444" filter="url(#shadow)"/>
  <text x="580" y="418" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="bold">🎨 Dify / Langflow</text>
  <text x="580" y="438" text-anchor="middle" fill="#fecaca" font-size="10">可视化低代码平台</text>

  <!-- No -> LangChain -->
  <line x1="770" y1="340" x2="780" y2="395" stroke="#ef4444" stroke-width="2.5"/>
  <text x="790" y="365" fill="#ef4444" font-size="12" font-weight="bold">否</text>

  <rect x="710" y="395" width="130" height="55" rx="12" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="775" y="418" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="bold">🔗 LangChain</text>
  <text x="775" y="438" text-anchor="middle" fill="#dbeafe" font-size="10">通用Agent框架</text>

  <!-- Legend -->
  <rect x="30" y="460" width="790" height="45" rx="8" fill="#1e293b" opacity="0.6" stroke="#334155"/>
  <text x="50" y="480" fill="#10b981" font-size="12">✓ 是</text>
  <text x="90" y="480" fill="#94a3b8" font-size="11">= 满足条件走此分支</text>
  <text x="280" y="480" fill="#ef4444" font-size="12">✗ 否</text>
  <text x="315" y="480" fill="#94a3b8" font-size="11">= 不满足，继续判断</text>
  <text x="500" y="480" fill="#94a3b8" font-size="11">💡 提示：大多数项目从 LangChain 开始，按需升级到 LangGraph 或多Agent框架</text>
</svg>
