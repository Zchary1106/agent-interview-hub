<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 600" font-family="sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/></marker>
  </defs>
  <rect width="760" height="600" fill="url(#bg)" rx="12"/>
  <text x="380" y="36" text-anchor="middle" fill="#f59e0b" font-size="20" font-weight="bold">Multi-Agent 协作（LangGraph Supervisor）</text>
  <text x="380" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">调度 → 分工 → 共享状态 → 人工审核</text>

  <rect x="320" y="72" width="120" height="40" rx="10" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="380" y="97" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">用户输入</text>
  <line x1="380" y1="112" x2="380" y2="136" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="40" y="138" width="680" height="380" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="380" y="160" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold">LangGraph 状态图</text>

  <rect x="300" y="174" width="160" height="56" rx="12" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="380" y="199" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">Supervisor</text>
  <text x="380" y="217" text-anchor="middle" fill="#78350f" font-size="11">核心路由决策</text>

  <line x1="380" y1="230" x2="160" y2="268" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="230" x2="380" y2="268" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="230" x2="600" y2="268" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="80" y="270" width="160" height="58" rx="12" fill="#10b981" filter="url(#shadow)"/>
  <text x="160" y="295" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">研究 Agent</text>
  <text x="160" y="313" text-anchor="middle" fill="#d1fae5" font-size="11">搜索 + 总结</text>

  <rect x="300" y="270" width="160" height="58" rx="12" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="380" y="295" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">代码 Agent</text>
  <text x="380" y="313" text-anchor="middle" fill="#ede9fe" font-size="11">编码 + 执行</text>

  <rect x="520" y="270" width="160" height="58" rx="12" fill="#ec4899" filter="url(#shadow)"/>
  <text x="600" y="295" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">写作 Agent</text>
  <text x="600" y="313" text-anchor="middle" fill="#fce7f3" font-size="11">撰写 + 润色</text>

  <line x1="160" y1="328" x2="340" y2="356" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="328" x2="380" y2="356" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="328" x2="420" y2="356" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="250" y="358" width="260" height="50" rx="12" fill="#06b6d4" filter="url(#shadow)"/>
  <text x="380" y="380" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">共享 State</text>
  <text x="380" y="398" text-anchor="middle" fill="#cffafe" font-size="10">messages + research + code + doc</text>
  <line x1="380" y1="408" x2="380" y2="436" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="270" y="438" width="220" height="54" rx="12" fill="#334155" filter="url(#shadow)"/>
  <text x="380" y="462" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">Human Review</text>
  <text x="380" y="480" text-anchor="middle" fill="#94a3b8" font-size="11">可选的人工审核节点</text>

  <line x1="380" y1="518" x2="380" y2="546" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="310" y="548" width="140" height="40" rx="10" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="380" y="573" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">最终输出</text>
</svg>
