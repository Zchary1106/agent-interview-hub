<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" font-family="sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/></marker>
  </defs>
  <rect width="760" height="470" fill="url(#bg)" rx="12"/>
  <text x="380" y="38" text-anchor="middle" fill="#f59e0b" font-size="21" font-weight="bold">大模型推理服务部署拓扑</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">网关 → 负载均衡 → 多实例 vLLM</text>

  <rect x="300" y="78" width="160" height="50" rx="12" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="380" y="108" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">客户端 / 前端</text>
  <line x1="380" y1="128" x2="380" y2="156" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="280" y="158" width="200" height="56" rx="12" fill="#06b6d4" filter="url(#shadow)"/>
  <text x="380" y="183" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">API Gateway</text>
  <text x="380" y="201" text-anchor="middle" fill="#cffafe" font-size="11">Nginx / Kong</text>
  <text x="500" y="190" text-anchor="start" fill="#94a3b8" font-size="11">← 鉴权、限流、协议转换</text>
  <line x1="380" y1="214" x2="380" y2="242" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="280" y="244" width="200" height="56" rx="12" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="380" y="269" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">负载均衡器</text>
  <text x="380" y="287" text-anchor="middle" fill="#78350f" font-size="11">轮询 / 最少连接 / 队列长度</text>

  <line x1="380" y1="300" x2="160" y2="356" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="300" x2="380" y2="356" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="300" x2="600" y2="356" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="70" y="358" width="180" height="72" rx="12" fill="#10b981" filter="url(#shadow)"/>
  <text x="160" y="390" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">vLLM #1</text>
  <text x="160" y="410" text-anchor="middle" fill="#d1fae5" font-size="11">4 × A100</text>

  <rect x="290" y="358" width="180" height="72" rx="12" fill="#10b981" filter="url(#shadow)"/>
  <text x="380" y="390" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">vLLM #2</text>
  <text x="380" y="410" text-anchor="middle" fill="#d1fae5" font-size="11">4 × A100</text>

  <rect x="510" y="358" width="180" height="72" rx="12" fill="#10b981" filter="url(#shadow)"/>
  <text x="600" y="390" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">vLLM #3</text>
  <text x="600" y="410" text-anchor="middle" fill="#d1fae5" font-size="11">4 × A100</text>
  <text x="380" y="452" text-anchor="middle" fill="#94a3b8" font-size="11">模型服务实例（横向扩展）</text>
</svg>
