<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="sans-serif"><defs>
  <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/></marker>
</defs><rect width="760" height="430" fill="url(#bg)" rx="12"/><text x="380.0" y="36" text-anchor="middle" fill="#f59e0b" font-size="20" font-weight="bold">QLoRA 训练结构</text><text x="380.0" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">4-bit 基座 + 16-bit LoRA 的省显存微调</text><rect x="135" y="95" width="490" height="58" rx="12" fill="#3b82f6" filter="url(#shadow)"/><text x="380.0" y="122.0" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">基础模型权重 W₀</text><text x="380.0" y="142.0" text-anchor="middle" fill="#dbeafe" font-size="11">NF4 / 4-bit / 冻结</text><rect x="135" y="167" width="490" height="58" rx="12" fill="#10b981" filter="url(#shadow)"/><text x="380.0" y="194.0" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">LoRA 权重 A, B</text><text x="380.0" y="214.0" text-anchor="middle" fill="#d1fae5" font-size="11">bf16 / 16-bit / 可训练</text><rect x="135" y="239" width="490" height="58" rx="12" fill="#f59e0b" filter="url(#shadow)"/><text x="380.0" y="266.0" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">前向传播</text><text x="380.0" y="286.0" text-anchor="middle" fill="#78350f" font-size="11">反量化 W₀ → bf16 → 计算</text><rect x="135" y="311" width="490" height="58" rx="12" fill="#8b5cf6" filter="url(#shadow)"/><text x="380.0" y="338.0" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">反向传播</text><text x="380.0" y="358.0" text-anchor="middle" fill="#ede9fe" font-size="11">只更新 A/B 梯度，不更新 W₀</text><text x="380" y="395" text-anchor="middle" fill="#fbbf24" font-size="12">关键：W₀ 保持 4-bit 存储，计算时临时反量化为 bf16</text></svg>
