<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 680" font-family="sans-serif"><defs>
  <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/></marker>
</defs><rect width="760" height="680" fill="url(#bg)" rx="12"/><text x="380.0" y="36" text-anchor="middle" fill="#f59e0b" font-size="20" font-weight="bold">Agentic RAG 自主检索闭环</text><text x="380.0" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">路由、检索、评估、自检与回退</text><rect x="300" y="75" width="160" height="42" rx="12" fill="#334155" filter="url(#shadow)"/><text x="380.0" y="101.0" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">用户 Query</text><rect x="250" y="140" width="260" height="54" rx="12" fill="#f59e0b" filter="url(#shadow)"/><text x="380.0" y="165.0" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Agent 决策中心</text><text x="380.0" y="185.0" text-anchor="middle" fill="#78350f" font-size="11">LLM + Prompt，维护状态/历史</text><line x1="380" y1="120" x2="380" y2="138" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="250" y="210" width="260" height="54" rx="12" fill="#3b82f6" filter="url(#shadow)"/><text x="380.0" y="235.0" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="bold">Step 1 路由判断</text><text x="380.0" y="255.0" text-anchor="middle" fill="#dbeafe" font-size="11">是否检索？用哪个数据源？</text><line x1="380" y1="190" x2="380" y2="208" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="250" y="280" width="260" height="54" rx="12" fill="#06b6d4" filter="url(#shadow)"/><text x="380.0" y="305.0" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="bold">Step 2 选择数据源</text><text x="380.0" y="325.0" text-anchor="middle" fill="#cffafe" font-size="11">向量库 / 结构化库 / Web / API</text><line x1="380" y1="260" x2="380" y2="278" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="250" y="350" width="260" height="54" rx="12" fill="#10b981" filter="url(#shadow)"/><text x="380.0" y="375.0" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="bold">Step 3 执行检索</text><text x="380.0" y="395.0" text-anchor="middle" fill="#d1fae5" font-size="11">Query改写 / 多路召回 / Rerank</text><line x1="380" y1="330" x2="380" y2="348" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="250" y="420" width="260" height="54" rx="12" fill="#8b5cf6" filter="url(#shadow)"/><text x="380.0" y="445.0" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="bold">Step 4 评估结果</text><text x="380.0" y="465.0" text-anchor="middle" fill="#ede9fe" font-size="11">相关性与信息充分性判断</text><line x1="380" y1="400" x2="380" y2="418" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="250" y="490" width="260" height="54" rx="12" fill="#ec4899" filter="url(#shadow)"/><text x="380.0" y="515.0" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="bold">Step 5 生成回答</text><text x="380.0" y="535.0" text-anchor="middle" fill="#fce7f3" font-size="11">Context + Query → LLM</text><line x1="380" y1="470" x2="380" y2="488" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="250" y="560" width="260" height="54" rx="12" fill="#ef4444" filter="url(#shadow)"/><text x="380.0" y="585.0" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="bold">Step 6 回答自检</text><text x="380.0" y="605.0" text-anchor="middle" fill="#fee2e2" font-size="11">幻觉与完整性检查</text><line x1="380" y1="540" x2="380" y2="558" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="300" y="630" width="160" height="42" rx="12" fill="#3b82f6" filter="url(#shadow)"/><text x="380.0" y="656.0" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">最终回答</text><line x1="380" y1="610" x2="380" y2="628" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/><line x1="510" y1="405" x2="620" y2="180" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="6 4"/><text x="625" y="280" text-anchor="start" fill="#fbbf24" font-size="11">不充分 / 有问题 → 回到决策</text></svg>
