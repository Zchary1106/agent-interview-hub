  <text x="685" y="178" text-anchor="middle" fill="#d1fae5" font-size="10">结构化输出</text>
  <rect x="620" y="230" width="130" height="48" rx="12" fill="#334155" filter="url(#shadow)"/>
  <text x="685" y="259" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">结果</text>

  <line x1="175" y1="163" x2="223" y2="163" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="375" y1="163" x2="423" y2="163" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="555" y1="163" x2="603" y2="163" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="685" y1="191" x2="685" y2="230" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="225" y="275" width="150" height="54" rx="12" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="300" y="298" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">Memory</text>
  <text x="300" y="316" text-anchor="middle" fill="#ede9fe" font-size="10">会话/长期记忆</text>
  <rect x="425" y="275" width="150" height="54" rx="12" fill="#ec4899" filter="url(#shadow)"/>
  <text x="500" y="298" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">Agent</text>
  <text x="500" y="316" text-anchor="middle" fill="#fce7f3" font-size="10">ReAct Loop</text>
  <rect x="625" y="325" width="150" height="54" rx="12" fill="#10b981" filter="url(#shadow)"/>
  <text x="700" y="348" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">Tools</text>
  <text x="700" y="366" text-anchor="middle" fill="#d1fae5" font-size="10">Tool 1 / Tool 2 / ...</text>

  <line x1="490" y1="191" x2="500" y2="275" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="275" x2="500" y2="191" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <line x1="375" y1="302" x2="423" y2="302" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="575" y1="302" x2="625" y2="345" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="625" y1="365" x2="575" y2="322" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
</svg>
