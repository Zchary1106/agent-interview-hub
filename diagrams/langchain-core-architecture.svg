  <rect x="225" y="135" width="150" height="56" rx="12" fill="#06b6d4" filter="url(#shadow)"/>
  <text x="300" y="160" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="bold">Prompt Template</text>
  <text x="300" y="178" text-anchor="middle" fill="#cffafe" font-size="10">变量填充 / 格式约束</text>
  <rect x="425" y="135" width="130" height="56" rx="12" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="490" y="168" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">LLM</text>
  <rect x="605" y="135" width="160" height="56" rx="12" fill="#10b981" filter="url(#shadow)"/>
