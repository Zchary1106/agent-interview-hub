<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/></marker>
  </defs>
  <rect width="760" height="360" fill="url(#bg)" rx="12"/>
  <text x="380" y="40" text-anchor="middle" fill="#f59e0b" font-size="21" font-weight="bold">Plan-and-Execute 模式</text>
  <text x="380" y="60" text-anchor="middle" fill="#94a3b8" font-size="12">规划 → 逐步执行 → 重规划闭环</text>

  <rect x="40" y="120" width="150" height="76" rx="12" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="115" y="163" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="bold">用户输入</text>

  <rect x="250" y="120" width="200" height="76" rx="12" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="350" y="155" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="bold">Planner</text>
  <text x="350" y="177" text-anchor="middle" fill="#78350f" font-size="11">生成多步计划</text>

  <rect x="510" y="120" width="210" height="76" rx="12" fill="#10b981" filter="url(#shadow)"/>
  <text x="615" y="155" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="bold">Executor</text>
  <text x="615" y="177" text-anchor="middle" fill="#d1fae5" font-size="11">逐步执行每个子任务</text>

  <line x1="190" y1="158" x2="248" y2="158" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="158" x2="508" y2="158" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="280" y="262" width="320" height="64" rx="12" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="440" y="290" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="bold">Replanner 评估</text>
  <text x="440" y="310" text-anchor="middle" fill="#ede9fe" font-size="11">每步执行后判断是否需要调整计划</text>

  <line x1="615" y1="196" x2="615" y2="294" stroke="#f59e0b" stroke-width="2.5"/>
  <line x1="615" y1="294" x2="602" y2="294" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="294" x2="160" y2="294" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6 4"/>
  <line x1="160" y1="294" x2="160" y2="200" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6 4"/>
  <line x1="160" y1="200" x2="250" y2="170" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="210" y="330" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">需要调整 → 回到 Planner</text>
</svg>
